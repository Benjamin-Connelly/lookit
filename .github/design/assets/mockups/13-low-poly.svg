<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-labelledby="t d">
  <title id="t">FUR — Low-Poly Prism</title>
  <desc id="d">Triangulated polygonal cat face, warm orange palette with pink accents. Crystalline low-poly aesthetic.</desc>

  <!-- Pale yellow-cream background -->
  <rect width="100" height="100" fill="#F5E6CF"/>

  <!-- Left ear -->
  <polygon points="15,30 25,5 35,28" fill="#D97543"/>
  <polygon points="25,5 30,25 35,28" fill="#AC3B15"/>
  <polygon points="15,30 22,35 35,28" fill="#F3B775"/>

  <!-- Right ear (mirror) -->
  <polygon points="75,5 85,30 65,28" fill="#D97543"/>
  <polygon points="75,5 70,25 65,28" fill="#AC3B15"/>
  <polygon points="85,30 78,35 65,28" fill="#F3B775"/>

  <!-- Forehead -->
  <polygon points="35,28 65,28 50,42" fill="#E89B47"/>
  <polygon points="35,28 22,35 50,42" fill="#D97543"/>
  <polygon points="65,28 78,35 50,42" fill="#AC3B15"/>

  <!-- Cheek / side zones -->
  <polygon points="22,35 14,60 34,52" fill="#E89B47"/>
  <polygon points="78,35 86,60 66,52" fill="#E89B47"/>
  <polygon points="22,35 34,52 50,42" fill="#F3B775"/>
  <polygon points="78,35 66,52 50,42" fill="#F3B775"/>

  <!-- Eye sockets (darker red-orange triangles) -->
  <polygon points="28,44 40,44 34,54" fill="#AC3B15"/>
  <polygon points="72,44 60,44 66,54" fill="#AC3B15"/>

  <!-- Actual eyes -->
  <ellipse cx="34" cy="49" rx="4" ry="5.5" fill="#F5E6CF"/>
  <ellipse cx="66" cy="49" rx="4" ry="5.5" fill="#F5E6CF"/>
  <ellipse cx="34" cy="49" rx="2.8" ry="4.5" fill="#E89B47"/>
  <ellipse cx="66" cy="49" rx="2.8" ry="4.5" fill="#E89B47"/>
  <rect x="32.8" y="44" width="2.4" height="10" fill="#1E1E1E"/>
  <rect x="64.8" y="44" width="2.4" height="10" fill="#1E1E1E"/>

  <!-- Muzzle region -->
  <polygon points="14,60 34,52 28,74" fill="#D97543"/>
  <polygon points="86,60 66,52 72,74" fill="#D97543"/>
  <polygon points="34,52 66,52 50,60" fill="#F3B775"/>
  <polygon points="34,52 50,60 28,74" fill="#E89B47"/>
  <polygon points="66,52 50,60 72,74" fill="#E89B47"/>

  <!-- Pink nose -->
  <polygon points="46,60 54,60 50,67" fill="#FF5F87"/>

  <!-- Chin segments -->
  <polygon points="28,74 50,60 50,88" fill="#AC3B15"/>
  <polygon points="72,74 50,60 50,88" fill="#AC3B15"/>
  <polygon points="28,74 50,88 36,95" fill="#D97543"/>
  <polygon points="72,74 50,88 64,95" fill="#D97543"/>
  <polygon points="36,95 50,88 64,95" fill="#E89B47"/>

  <!-- Mouth crease -->
  <path d="M 46 70 Q 50 73 54 70" stroke="#1E1E1E" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
