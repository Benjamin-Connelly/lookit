<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-labelledby="t d">
  <title id="t">FUR — Vintage Halloween</title>
  <desc id="d">1930s die-cut Halloween cat in Bindery palette: ragged ink silhouette, brass slit-pupil eyes, sienna open fanged mouth, parchment whiskers.</desc>

  <!-- Ragged-edge head silhouette -->
  <path d="
    M 14 32 L 10 26 L 18 28 L 16 20 L 24 26 L 22 14
    L 30 6 L 36 28 L 40 8 L 46 24 L 50 2 L 54 24
    L 60 8 L 64 28 L 70 6 L 78 14 L 76 26 L 84 20
    L 82 28 L 90 26 L 86 34
    Q 94 46 88 58
    L 96 62 L 86 68 L 94 74 L 84 78 L 90 86 L 80 86
    L 82 94 L 74 88 L 70 96 L 64 88 L 58 94 L 54 88
    L 50 96 L 46 88 L 42 94 L 36 88 L 30 96 L 26 88
    L 20 94 L 18 86 L 10 86 L 16 78 L 6 74 L 14 68
    L 4 62 L 12 58 Q 6 46 14 32 Z
  " fill="#1E1E1E"/>

  <!-- Eye whites (parchment) -->
  <ellipse cx="35" cy="48" rx="8" ry="11" fill="#F5ECD9"/>
  <ellipse cx="65" cy="48" rx="8" ry="11" fill="#F5ECD9"/>

  <!-- Brass irises -->
  <ellipse cx="35" cy="48" rx="5" ry="9" fill="#C9A961"/>
  <ellipse cx="65" cy="48" rx="5" ry="9" fill="#C9A961"/>

  <!-- Ink slit pupils -->
  <rect x="33.5" y="40" width="3" height="16" fill="#1E1E1E"/>
  <rect x="63.5" y="40" width="3" height="16" fill="#1E1E1E"/>

  <!-- Sienna triangle nose (warm Halloween orange) -->
  <polygon points="45,62 55,62 50,68" fill="#A84A1F"/>

  <!-- Open mouth (sienna interior) -->
  <path d="M 40 72 L 60 72 L 58 80 L 52 86 L 48 86 L 42 80 Z" fill="#A84A1F"/>

  <!-- Parchment fangs -->
  <polygon points="42,72 44,80 47,72" fill="#F5ECD9"/>
  <polygon points="53,72 56,80 58,72" fill="#F5ECD9"/>
  <polygon points="47,83 50,86 53,83" fill="#F5ECD9"/>

  <!-- Parchment whiskers -->
  <line x1="2" y1="60" x2="16" y2="62" stroke="#F5ECD9" stroke-width="1" stroke-linecap="round"/>
  <line x1="0" y1="68" x2="14" y2="68" stroke="#F5ECD9" stroke-width="1" stroke-linecap="round"/>
  <line x1="84" y1="62" x2="98" y2="60" stroke="#F5ECD9" stroke-width="1" stroke-linecap="round"/>
  <line x1="86" y1="68" x2="100" y2="68" stroke="#F5ECD9" stroke-width="1" stroke-linecap="round"/>

  <!-- Ear highlight wisps -->
  <line x1="28" y1="14" x2="30" y2="24" stroke="#F5ECD9" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="72" y1="14" x2="70" y2="24" stroke="#F5ECD9" stroke-width="0.8" stroke-linecap="round"/>
</svg>
