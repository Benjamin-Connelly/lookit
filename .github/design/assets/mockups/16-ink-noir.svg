<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-labelledby="t d">
  <title id="t">FUR — Ink Noir</title>
  <desc id="d">Sumi-e brush-stroke cat with oxblood glowing eyes, ink splatter, and drip trails. Bindery palette: ink, oxblood, parchment accents.</desc>

  <!-- Ink splatter scatter -->
  <g fill="#1E1E1E">
    <circle cx="8"  cy="14" r="0.9"/>
    <circle cx="14" cy="26" r="1.5"/>
    <circle cx="5"  cy="42" r="0.7"/>
    <circle cx="11" cy="55" r="0.5"/>
    <circle cx="92" cy="18" r="1.3"/>
    <circle cx="87" cy="32" r="0.8"/>
    <circle cx="95" cy="58" r="0.6"/>
    <circle cx="18" cy="82" r="1.1"/>
    <circle cx="84" cy="84" r="1"/>
    <ellipse cx="4"  cy="60" rx="1.4" ry="0.6"/>
    <ellipse cx="96" cy="76" rx="0.8" ry="2"/>
    <circle cx="90" cy="44" r="0.5"/>
    <circle cx="3"  cy="28" r="0.6"/>
  </g>

  <!-- Drip trails -->
  <g stroke="#1E1E1E" stroke-width="0.7" stroke-linecap="round">
    <line x1="22" y1="88" x2="22" y2="98"/>
    <line x1="38" y1="90" x2="38" y2="100"/>
    <line x1="62" y1="88" x2="62" y2="100"/>
    <line x1="78" y1="92" x2="78" y2="99"/>
    <line x1="50" y1="92" x2="50" y2="100"/>
  </g>

  <!-- Silhouette with rough brush edges -->
  <path d="
    M 22 42 L 18 34 L 24 38 L 20 28 L 28 32 L 24 20 L 32 26
    L 30 10 L 38 24 L 42 6  L 50 20 L 58 6  L 62 24
    L 70 10 L 68 26 L 76 20 L 72 32 L 80 28 L 76 38 L 82 34
    L 86 42
    Q 94 52 88 62
    L 92 70 L 86 72 L 90 82 L 82 86 L 84 92
    L 72 88 L 68 94 L 60 88 L 54 94 L 46 88 L 40 94 L 32 88
    L 28 94 L 16 86 L 18 80 L 10 78 L 14 70 L 8 66 L 12 58
    Q 6 50 14 42 Z
  " fill="#1E1E1E"/>

  <!-- Oxblood glowing eyes (more noir than neon red) -->
  <ellipse cx="38" cy="46" rx="5" ry="2.8" fill="#8B2635"/>
  <ellipse cx="62" cy="46" rx="5" ry="2.8" fill="#8B2635"/>

  <!-- Pupil slits -->
  <rect x="37" y="43" width="2" height="6" fill="#1E1E1E"/>
  <rect x="61" y="43" width="2" height="6" fill="#1E1E1E"/>

  <!-- Brass eye-glow highlights -->
  <circle cx="40" cy="45" r="0.6" fill="#C9A961"/>
  <circle cx="64" cy="45" r="0.6" fill="#C9A961"/>

  <!-- Brush-stroke whiskers -->
  <g stroke="#1E1E1E" stroke-width="0.9" stroke-linecap="round">
    <line x1="5"  y1="56" x2="22" y2="60"/>
    <line x1="3"  y1="64" x2="22" y2="66"/>
    <line x1="78" y1="60" x2="95" y2="56"/>
    <line x1="78" y1="66" x2="97" y2="64"/>
  </g>

  <!-- Small dark nose -->
  <polygon points="46,62 54,62 50,68" fill="#1E1E1E"/>

  <!-- Parchment wet-ink highlights -->
  <g stroke="#F5ECD9" stroke-width="0.6" stroke-linecap="round" opacity="0.55">
    <line x1="28" y1="18" x2="30" y2="26"/>
    <line x1="36" y1="36" x2="40" y2="40"/>
    <line x1="60" y1="40" x2="64" y2="36"/>
    <line x1="70" y1="26" x2="72" y2="18"/>
    <line x1="26" y1="74" x2="30" y2="78"/>
    <line x1="74" y1="74" x2="70" y2="78"/>
  </g>
</svg>
