<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" shape-rendering="crispEdges" role="img" aria-labelledby="t d">
  <title id="t">FUR — NES Pixel</title>
  <desc id="d">8-bit pixel cat: every shape snapped to a 5-unit grid. Terminal prompt mouth rendered pixel-by-pixel, NES-era silhouette.</desc>

  <!-- Cat silhouette (all coords on 5u grid) -->
  <path d="
    M 18 5 L 28 5 L 28 18 L 40 18 L 40 22 L 60 22 L 60 18 L 72 18
    L 72 5 L 82 5 L 82 22 L 90 22 L 90 78 L 82 78 L 82 88 L 72 88
    L 72 92 L 28 92 L 28 88 L 18 88 L 18 78 L 10 78 L 10 22 L 18 22 Z
  " fill="#1E1E1E"/>

  <!-- Inner ear pixels -->
  <rect x="20" y="9"  width="6" height="6" fill="#FF5F87"/>
  <rect x="74" y="9"  width="6" height="6" fill="#B267E6"/>

  <!-- Eyes: cream blocks with slit pupils -->
  <rect x="25" y="40" width="15" height="10" fill="#F5F5F5"/>
  <rect x="60" y="40" width="15" height="10" fill="#F5F5F5"/>
  <rect x="30" y="40" width="5"  height="10" fill="#1E1E1E"/>
  <rect x="65" y="40" width="5"  height="10" fill="#1E1E1E"/>

  <!-- Nose -->
  <rect x="45" y="60" width="10" height="5" fill="#FF5F87"/>

  <!-- Mouth ">_" as pure pixels -->
  <rect x="35" y="72" width="5"  height="5" fill="#B267E6"/>
  <rect x="40" y="77" width="5"  height="5" fill="#B267E6"/>
  <rect x="35" y="82" width="5"  height="5" fill="#B267E6"/>
  <rect x="55" y="82" width="10" height="5" fill="#B267E6"/>
</svg>
