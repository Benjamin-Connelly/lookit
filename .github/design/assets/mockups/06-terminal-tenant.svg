<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-labelledby="t d">
  <title id="t">FUR — Terminal Tenant</title>
  <desc id="d">Cat peering out from inside a terminal window. Traffic-light dots, prompt + cursor at base. Literal "cat" in a terminal.</desc>

  <!-- Window chrome -->
  <rect x="4" y="8" width="92" height="84" rx="5" fill="#1E1E1E"/>
  <rect x="4" y="8" width="92" height="84" rx="5" fill="none" stroke="#FF5F87" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="4" y="8" width="92" height="12" fill="#2A232E" rx="5"/>
  <rect x="4" y="14" width="92" height="6" fill="#2A232E"/>
  <line x1="4" y1="20" x2="96" y2="20" stroke="#FF5F87" stroke-width="0.6" opacity="0.55"/>

  <!-- Traffic lights -->
  <circle cx="11" cy="14" r="2" fill="#FF5F87"/>
  <circle cx="18" cy="14" r="2" fill="#B267E6"/>
  <circle cx="25" cy="14" r="2" fill="#4A4A4A"/>

  <!-- Cat face (cream, set inside the dark terminal) -->
  <path d="
    M 32 38
    L 36 26 L 44 36
    L 56 36 L 64 26 L 68 38
    Q 74 41 74 50
    Q 74 64 66 68
    Q 50 73 34 68
    Q 26 64 26 50
    Q 26 41 32 38 Z
  " fill="#F5F5F5"/>

  <!-- Inner ears -->
  <polygon points="38,29 40,35 43,35" fill="#FF5F87"/>
  <polygon points="62,29 60,35 57,35" fill="#B267E6"/>

  <!-- Eyes (dark almonds) -->
  <ellipse cx="40" cy="50" rx="2" ry="3" fill="#1E1E1E"/>
  <ellipse cx="60" cy="50" rx="2" ry="3" fill="#1E1E1E"/>

  <!-- Nose -->
  <polygon points="47,58 53,58 50,62" fill="#FF5F87"/>

  <!-- Stoic whisker line -->
  <rect x="44" y="65" width="12" height="0.8" fill="#1E1E1E"/>

  <!-- Prompt: ">" + blinking cursor -->
  <polygon points="10,82 10,90 16,86" fill="#B267E6"/>
  <rect x="20" y="82" width="3.5" height="8" fill="#FF5F87"/>
</svg>
